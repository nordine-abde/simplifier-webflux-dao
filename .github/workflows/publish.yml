name: Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: Library version to publish
        required: true
        default: 0.1.0-SNAPSHOT
  release:
    types:
      - published

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Test
        run: ./gradlew test

      - name: Publish to GitHub Packages
        run: ./gradlew :lib:publish -PlibraryVersion=${{ steps.version.outputs.value }} --no-configuration-cache
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
